-tuning with unbiased datasets, model merging, and gradient ascent. While these methods have experimentally proven effective, they can still be sub-optimum in fully disentangling biases from reasoning. To address this gap, we propose Selective Disentanglement Unlearning (SDU), a novel unlearning framework that selectively removes biased knowledge while preserving reasoning capabilities. SDU operates in three stages: identifying biased parameters using a shadow LLM, fine-tuning with unbiased data, and performing selective parameter updates based on weight saliency. Experimental results across multiple LLMs show that SDU improves fairness accuracy by 14.7% and enhances reasoning performance by 62.6% compared to existing baselines."])</script><script>self.__next_f.push([1,"d:[\"$\",\"div\",null,{\"className\":\"publications mt-8\",\"children\":[[\"$\",\"h2\",null,{\"className\":\"section-heading\",\"children\":\"Selected publications\"}],[\"$\",\"ol\",null,{\"className\":\"list-none p-0\",\"children\":[[\"$\",\"$L12\",\"liu2025disentangling\",{\"pub\":{\"key\":\"liu2025disentangling\",\"type\":\"inproceedings\",\"title\":\"Disentangling Biased Knowledge from Reasoning in Large Language Models via Machine Unlearning\",\"author\":\"Liu, Zheyuan and Maharjan, Suraj and Wu, Fanyou and Parikh, Rahil and Bayar, Belhassen and Sengamedu, Srinivasan H. and Jiang, Meng\",\"authors\":[\"Zheyuan Liu\",\"Suraj Maharjan\",\"Fanyou Wu\",\"Rahil Parikh\",\"Belhassen Bayar\",\"Srinivasan H. Sengamedu\",\"Meng Jiang\"],\"year\":\"2025\",\"journal\":\"$undefined\",\"booktitle\":\"Proceedings of the 63rd Annual Meeting of the Association for Computational Linguistics\",\"venue\":\"Proceedings of the 63rd Annual Meeting of the Association for Computational Linguistics\",\"doi\":\"10.18653/v1/2025.acl-long.305\",\"arxiv\":\"$undefined\",\"html\":\"https://aclanthology.org/2025.acl-long.305/\",\"pdf\":\"$undefined\",\"code\":\"$undefined\",\"emoji\":\"pen\",\"selected\":true,\"abstract\":\"$ ue,\"nonce\":\"$undefined\"}]\nf:[\"$\",\"$L19\",null,{\"children\":[\"$\",\"$1a\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@1b\"}]}]\n10:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L1c\",null,{\"children\":\"$L1d\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L1e\",null,{\"children\":[\"$\",\"$1a\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L1f\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"14:[\"$\",\"$L12\",\"liu2023can\",{\"pub\":{\"key\":\"liu2023can\",\"type\":\"article\",\"title\":\"Can language models be used for real-world urban-delivery route optimization?\",\"author\":\"Liu, Yang and Wu, Fanyou and Liu, Zhiyuan and Wang, Kai and Wang, Feiyue and Qu, Xiaobo\",\"authors\":[\"Yang Liu\",\"Fanyou Wu\",\"Zhiyuan Liu\",\"Kai Wang\",\"Feiyue Wang\",\"Xiaobo Qu\"],\"year\":\"2023\",\"journal\":\"The Innovation\",\"booktitle\":\"$undefined\",\"venue\":\"The Innovation\",\"doi\":\"10.1016/j.xinn.2023.100520\",\"arxiv\":\"$undefined\",\"html\":\"https://doi.org/10.1016/j.xinn.2023.100520\",\"pdf\":\"$undefined\",\"code\":\"$undefined\",\"emoji\":\"traffic\",\"selected\":true,\"abstract\":\"$undefined\",\"volume\":\"$undefined\",\"number\":\"$undefined\",\"pages\":\"$undefined\",\"rawBibtex\":\"@article{liu2023can,\\n  title = {Can language models be used for real-world urban-delivery route optimization?},\\n  author = {Liu, Yang and Wu, Fanyou and Liu, Zhiyuan and Wang, Kai and Wang, Feiyue and Qu, Xiaobo},\\n  journal = {The Innovation},\\n  year = {2023},\\n  doi = {10.1016/j.xinn.2023.100520},\\n  publisher = {Elsevier}\\n}\"}}]\n20:T545,Tree-ring dating enables gathering necessary knowledge about trees, and it is essential in many areas, including forest management and the timber industry. Treering dating can be conducted on either wood's clean cross-sections or tree trunks' rough end cross-sections. However, the measurement process is still time-consuming and frequently requires experts who use special devices, such as stereoscopes. Modern approaches based on image processing using deep learning have been successfully applied in many areas, and they can succeed in recognizing tree rings. While supervised deep learning-based methods often produce excellent results, they also depend on extensive datasets of tediously annotated data. To our knowledge, there are only a few publicly available ring image datasets with annotations. We introduce a new carefully captured dataset of images of hardwood species automatically annotated for tree ring detection. We capture each wood cookie twice, once in the rough form, similar to industrial settings, and then after careful cleaning, that reveals all growth rings. We carefully overlap the images and use them for an automatic ring annotation in the rough data. We then use the Feature Pyramid Network with Resnet encoder that obtains an overall pixel-level area under the curve score of 85.72% and ring level F1 score of 0.7348.15:[\"$\",\"$L12\",\"wu2023ring\",{\"pub\":{\"key\":\"wu2023ring\",\"type\":\"article\",\"title\":\"Data Collection and Deep Learning-Based Detection of Wood Growth Rings\",\"author\":\"Wu, Fanyou and Huang, Yunmei and Benes, Bedrich and Warner, Charles and Gazo, Rado\",\"authors\":[\"Fanyou Wu\",\"Yunmei Huang\",\"Bedrich Benes\",\"Charles Warner\",\"Rado Gazo\"],\"year\":\"2023\",\"journal\":\"Information Processing in Agriculture\",\"booktitle\":\"$undefined\",\"venue\":\"Information Processing in Agriculture\",\"doi\":\"$undefined\",\"arxiv\":\"$undefined\",\"html\":\"https://www.sciencedirect.com/science/article/pii/S2214317323000781\",\"pdf\":\"$undefined\",\"code\":\"$undefined\",\"emoji\":\"tree\",\"selected\":true,\"abstract\":\"$20\",\"volume\":\"$undefined\",\"number\":\"$undefined\",\"pages\":\"$undefined\",\"rawBibtex\":\"@article{wu2023ring,\\n  title = {Data Collection and Deep Learning-Based Detection of Wood Growth Rings},\\n  author = {Wu, Fanyou and Huang, Yunmei and Benes, Bedrich and Warner, Charles and Gazo, Rado},\\n  journal = {Information Processing in Agriculture},\\n  year = {2023}\\n}\"}}]\n21:T452,The vehicle dispatching system is one of the most critical problems in online taxi-hailing platforms, which requires adapting the operation and management strategy to the dynamics of demand and supply. In this paper, we propose a single-agent deep reinforcement learning approach for the vehicle repositioning problem by reallocating vacant vehicles to regions with a large demand gap in advance. The simulator and the vehicle repositioning algorithm are designed based on industrial-scale real-world data and the workflow of online taxi-hailing platforms, ensuring the practical value of our approach. Besides, the vehicle repositioning probl"])</script><script>self.__next_f.push([1,"em is translated in analogy with the load balancing problem in computers. Inspired by the recommendation system, the high concurrency of repositioning requests is addressed by sorting the actions as a recommendation list, whereby matching action with requests. Experiments demonstrate that the proposed approach is superior to the existing ones. It is also worth noting that the proposed approach won first place in the vehicle repositioning task of KDD Cup 2020.16:[\"$\",\"$L12\",\"liu2022learning\",{\"pub\":{\"key\":\"liu2022learning\",\"type\":\"article\",\"title\":\"Deep dispatching: A deep reinforcement learning approach for vehicle dispatching on online ride-hailing platform\",\"author\":\"Liu, Yang and Wu, Fanyou and Lyu, Cheng and Li, Shen and Ye, Jiepin and Qu, Xiaobo\",\"authors\":[\"Yang Liu\",\"Fanyou Wu\",\"Cheng Lyu\",\"Shen Li\",\"Jiepin Ye\",\"Xiaobo Qu\"],\"year\":\"2022\",\"journal\":\"Transportation Research Part E\",\"booktitle\":\"$undefined\",\"venue\":\"Transportation Research Part E\",\"doi\":\"10.1016/j.tre.2022.102694\",\"arxiv\":\"$undefined\",\"html\":\"https://doi.org/10.1016/j.tre.2022.102694\",\"pdf\":\"$undefined\",\"code\":\"$undefined\",\"emoji\":\"traffic\",\"selected\":true,\"abstract\":\"$21\",\"volume\":\"$undefined\",\"number\":\"$undefined\",\"pages\":\"$undefined\",\"rawBibtex\":\"@article{liu2022learning,\\n  title = {Deep dispatching: A deep reinforcement learning approach for vehicle dispatching on online ride-hailing platform},\\n  author = {Liu, Yang and Wu, Fanyou and Lyu, Cheng and Li, Shen and Ye, Jiepin and Qu, Xiaobo},\\n  journal = {Transportation Research Part E},\\n  year = {2022},\\n  doi = {10.1016/j.tre.2022.102694}\\n}\"}}]\n22:T41e,Species identification is one of the key steps in the management and conservation planning of many forest ecosystems. We introduce Deep BarkID, a portable tree identification system that detects tree species from bark images. Existing bark identification systems rely heavily on massive computing power access, which may be scarce in many locations. Our approach is deployed as a smartphone application that does not require any connection to a database. Its intended use is in a forest, where internet connection is often unavailable. The tree bark identification is expressed as a bark image classification task, and it is implemented as a convolutional neural network (CNN). This research focuses on developing light-weight CNN models through knowledge distillation. Overall, we achieved 96.12% accuracy for tree species classification tasks for ten common tree species in Indiana, USA. We also captured and prepared thousands of bark images—a dataset that we call Indiana Bark Dataset—and we make it available at https://github.com/wufanyou/DBID.17:[\"$\",\"$L12\",\"wu2021bark\",{\"pub\":{\"key\":\"wu2021bark\",\"type\":\"article\",\"title\":\"Deep BarkID: A Portable Tree Bark Identification System by Knowledge Distillation\",\"author\":\"Wu, Fanyou and Gazo, Rado and Benes, Bedrich and Haviarova, Eva\",\"authors\":[\"Fanyou Wu\",\"Rado Gazo\",\"Bedrich Benes\",\"Eva Haviarova\"],\"year\":\"2021\",\"journal\":\"European Journal of Forest Research\",\"booktitle\":\"$undefined\",\"venue\":\"European Journal of Forest Research\",\"doi\":\"10.1007/s10342-021-01407-7\",\"arxiv\":\"$undefined\",\"html\":\"https://link.springer.com/article/10.1007/s10342-021-01407-7\",\"pdf\":\"$undefined\",\"code\":\"https://github.com/wufanyou/DBID\",\"emoji\":\"tree\",\"selected\":true,\"abstract\":\"$22\",\"volume\":\"$undefined\",\"number\":\"$undefined\",\"pages\":\"$undefined\",\"rawBibtex\":\"@article{wu2021bark,\\n  title = {Deep BarkID: A Portable Tree Bark Identification System by Knowledge Distillation},\\n  author = {Wu, Fanyou and Gazo, Rado and Benes, Bedrich and Haviarova, Eva},\\n  journal = {European Journal of Forest Research},\\n  year = {2021},\\n  doi = {10.1007/s10342-021-01407-7}\\n}\"}}]\n"])</script><script>self.__next_f.push([1,"18:[\"$\",\"$L12\",\"wu2021wood\",{\"pub\":{\"key\":\"wu2021wood\",\"type\":\"article\",\"title\":\"Wood Identification Based on Longitudinal Section Images by Using Deep Learning\",\"author\":\"Wu, Fanyou and Gazo, Rado and Haviarova, Eva and Benes, Bedrich\",\"authors\":[\"Fanyou Wu\",\"Rado Gazo\",\"Eva Haviarova\",\"Bedrich Benes\"],\"year\":\"2021\",\"journal\":\"Wood Science and Technology\",\"booktitle\":\"$undefined\",\"venue\":\"Wood Science and Technology\",\"doi\":\"10.1007/s00226-021-01261-1\",\"arxiv\":\"$undefined\",\"html\":\"https://link.springer.com/article/10.1007/s00226-021-01261-1\",\"pdf\":\"$undefined\",\"code\":\"https://github.com/wufanyou/lumber_identification\",\"emoji\":\"tree\",\"selected\":true,\"abstract\":\"Automatic species identification has the potential to improve the efficacy and automation of wood processing systems significantly. Recent advances in deep learning allowed for the automation of many previously difficult tasks, and in this paper, we investigate the feasibility of using Deep Convolutional Neural Networks (CNNs) for hardwood lumber identification. In particular, we tested two highly effective CNNs (ResNet-50 and DenseNet-121) as well as lightweight MobileNet-V2. Overall, we achieved 98.2% accuracy for 11 common hardwood species classification tasks.\",\"volume\":\"55\",\"number\":\"2\",\"pages\":\"553-563\",\"rawBibtex\":\"@article{wu2021wood,\\n  title = {Wood Identification Based on Longitudinal Section Images by Using Deep Learning},\\n  author = {Wu, Fanyou and Gazo, Rado and Haviarova, Eva and Benes, Bedrich},\\n  journal = {Wood Science and Technology},\\n  year = {2021},\\n  doi = {10.1007/s00226-021-01261-1},\\n  volume = {55},\\n  number = {2},\\n  pages = {553-563}\\n}\"}}]\n"])</script><script>self.__next_f.push([1,"1d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"23:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/d2be314c3ece3fbe.js\"],\"IconMark\"]\n1b:null\n1f:[[\"$\",\"title\",\"0\",{\"children\":\"Fanyou Wu | 吴凡优\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Personal website of Fanyou Wu\"}],[\"$\",\"link\",\"2\",{\"rel\":\"icon\",\"href\":\"/favicon.ico?favicon.0b3bf435.ico\",\"sizes\":\"256x256\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"3\",{\"rel\":\"icon\",\"href\":\"/assets/img/favicon.ico\"}],[\"$\",\"$L23\",\"4\",{}]]\n"])</script></body></html>
